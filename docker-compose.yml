services:
  hickory:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_EXTERNAL_DEPS: "0"
        INSTALL_SAM3D_RUNTIME_DEPS: "1"
        INSTALL_FOUNDATIONPOSE_RUNTIME_DEPS: "1"
        INSTALL_CLIPPER: "1"
        INSTALL_SAM2: "0"
    image: hickory:cuda12.1
    working_dir: /workspace
    stdin_open: true
    tty: true
    shm_size: "16gb"
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
      ROMAN_WEIGHTS: /workspace/weights
      TORCH_HOME: /workspace/weights/torch
      HF_HOME: /workspace/weights/huggingface
      TRANSFORMERS_CACHE: /workspace/weights/huggingface/transformers
      XDG_CACHE_HOME: /workspace/weights/cache
      CONDA_PREFIX: /opt/conda/envs/hickory
      CUDA_HOME: /opt/conda/envs/hickory
      FORCE_CUDA: "1"
      CUDA_ARCH: "7.0;7.5;8.0;8.6;8.9;9.0"
      NATTEN_CUDA_ARCH: "7.0;7.5;8.0;8.6;8.9;9.0"
      NATTEN_WITH_CUDA: "1"
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"
      OMP_NUM_THREADS: "8"
      MKL_NUM_THREADS: "8"
      OPENBLAS_NUM_THREADS: "8"
    volumes:
      - ./main.py:/workspace/main.py:ro
      - ./hickory:/workspace/hickory:ro
      - ./weights:/workspace/weights
      - ./dataset:/workspace/dataset
      - ./reconstruction:/workspace/reconstruction
      - ./third_party/FoundationPose/weights:/workspace/third_party/FoundationPose/weights
      - ./third_party/sam-3d-objects/checkpoints:/workspace/third_party/sam-3d-objects/checkpoints
      - ./params:/workspace/params:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["python", "main.py", "--help"]
